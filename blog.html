<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Base — SafeAI Ireland</title>
  <meta name="description" content="Practical AI guides for Irish businesses, schools and community organisations — covering the EU AI Act, AI risks, and safe AI use at work." />
  <link rel="canonical" href="https://safeai.ie/blog.html" />
  <link rel="icon" type="image/png" href="safeai-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Poppins', sans-serif; color: #3D4F5C; background: #fff; }
    a { color: #1B9AAA; text-decoration: none; }
    a:hover { color: #147a87; }

    /* ── Header ── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.97); backdrop-filter: blur(8px);
      border-bottom: 1px solid #e8edf2; padding: 0 24px;
    }
    .header-inner {
      max-width: 1060px; margin: 0 auto;
      min-height: 72px; display: flex; align-items: center; justify-content: space-between; gap: 24px;
    }
    .header-logo img { height: 46px; width: auto; display: block; }
    .header-nav { display: flex; align-items: center; gap: 4px; }
    .nav-link {
      font-size: 13px; font-weight: 500; color: #3D4F5C;
      padding: 8px 12px; border-radius: 6px; transition: background 0.15s, color 0.15s;
    }
    .nav-link:hover { background: #F7F9FB; color: #1B9AAA; }
    .nav-cta {
      background: #1B9AAA; color: #fff;
      font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 13px;
      padding: 10px 18px; border-radius: 6px; margin-left: 8px;
      transition: opacity 0.15s; display: inline-flex; align-items: center;
    }
    .nav-cta:hover { opacity: 0.88; color: #fff; }
    @media (max-width: 640px) { .header-nav .nav-link { display: none; } }

    /* ── Hero ── */
    .blog-hero {
      background: linear-gradient(135deg, #0D1F2D 0%, #1a3a4f 60%, #1B9AAA 100%);
      padding: 56px 24px 48px; text-align: center;
    }
    .hero-eyebrow {
      display: inline-block; font-size: 11px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(143,227,237,0.9); margin-bottom: 14px;
    }
    .blog-hero h1 {
      font-size: clamp(26px, 4vw, 42px); font-weight: 700; color: #fff;
      line-height: 1.2; margin-bottom: 12px;
    }
    .blog-hero p { font-size: 15px; color: rgba(255,255,255,0.72); max-width: 520px; margin: 0 auto; line-height: 1.7; }

    /* ── Grid ── */
    .page-body { max-width: 1060px; margin: 0 auto; padding: 48px 24px 80px; }
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }

    /* ── Card ── */
    .post-card {
      background: #fff; border: 1px solid #e0e8ef; border-radius: 12px;
      overflow: hidden; display: flex; flex-direction: column;
      transition: box-shadow 0.2s, transform 0.2s; text-decoration: none; color: inherit;
    }
    .post-card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.09); transform: translateY(-2px); color: inherit; }
    .post-card-cover {
      height: 180px;
      background: linear-gradient(135deg, #0D1F2D 0%, #1B9AAA 100%);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .post-card-cover img { width: 100%; height: 100%; object-fit: cover; }
    .post-card-cover-icon { opacity: 0.2; }
    .post-card-body { padding: 20px 22px 22px; flex: 1; display: flex; flex-direction: column; }
    .post-card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .post-card-tag {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      background: rgba(27,154,170,0.1); color: #1B9AAA; padding: 3px 9px; border-radius: 4px;
    }
    .post-card h2 { font-size: 16px; font-weight: 700; color: #1E2D3D; line-height: 1.4; margin-bottom: 8px; }
    .post-card p { font-size: 13px; color: #6B7A87; line-height: 1.7; flex: 1; margin-bottom: 16px; }
    .post-card-footer {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: #6B7A87;
      border-top: 1px solid #f0f4f7; padding-top: 12px;
    }
    .post-card-read { font-size: 13px; font-weight: 600; color: #1B9AAA; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 80px 24px; }
    .empty-state h2 { font-size: 20px; font-weight: 600; color: #1E2D3D; margin-bottom: 10px; }
    .empty-state p { font-size: 15px; color: #6B7A87; }

    /* ── Footer ── */
    .site-footer { background: #0D1F2D; padding: 28px 24px; }
    .footer-inner { max-width: 1060px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .footer-copy { font-size: 12px; color: rgba(255,255,255,0.4); }
    .footer-links { display: flex; gap: 20px; flex-wrap: wrap; }
    .footer-links a { font-size: 12px; color: rgba(255,255,255,0.5); transition: color 0.15s; }
    .footer-links a:hover { color: #fff; }

    @media (max-width: 560px) { .posts-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html"><img src="safeai-logo.svg" alt="SafeAI" class="header-logo" style="height:46px;width:auto;display:block;" /></a>
    <nav class="header-nav">
      <a href="index.html#services" class="nav-link">Services</a>
      <a href="index.html#free-tools" class="nav-link">Free Tools</a>
      <a href="faq.html" class="nav-link">FAQ</a>
      <a href="why-train.html" class="nav-link">Why Train?</a>
      <a href="blog.html" class="nav-link" style="color:#1B9AAA;font-weight:600;">Knowledge Base</a>
      <a href="index.html#about" class="nav-link">About</a>
      <a href="index.html#booking" class="nav-cta">Book a Call</a>
    </nav>
  </div>
</header>

<section class="blog-hero">
  <span class="hero-eyebrow">SafeAI Knowledge Base</span>
  <h1>Practical AI guides for Irish organisations</h1>
</section>

<div class="page-body">
  <div id="posts-area"></div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <span class="footer-copy">&copy; 2026 SafeAI &nbsp;&middot;&nbsp; General information, not legal advice.</span>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="blog.html">Knowledge Base</a>
      <a href="faq.html">FAQ</a>
      <a href="why-train.html">Why Train?</a>
      <a href="index.html#services">Services</a>
      <a href="mailto:marcela@safeai.ie">marcela@safeai.ie</a>
    </div>
  </div>
</footer>

<script>
  function fmtDate(str) {
    return new Date(str).toLocaleDateString('en-IE', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  var area = document.getElementById('posts-area');

  fetch('blog-posts.json')
    .then(function(r) { return r.json(); })
    .then(function(posts) {
      if (!posts.length) {
        area.innerHTML = '<div class="empty-state"><h2>Articles coming soon</h2><p>Check back shortly — new articles are on the way.</p></div>';
        return;
      }

      var html = '<div class="posts-grid">';
      posts.forEach(function(p) {
        var cover = p.image
          ? '<img src="' + p.image + '" alt="" loading="lazy" />'
          : '<svg class="post-card-cover-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#fff"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        var tags = (p.tags || []).map(function(t) {
          return '<span class="post-card-tag">' + t + '</span>';
        }).join('');

        html +=
          '<a class="post-card" href="posts/' + p.slug + '.html">' +
            '<div class="post-card-cover">' + cover + '</div>' +
            '<div class="post-card-body">' +
              (tags ? '<div class="post-card-tags">' + tags + '</div>' : '') +
              '<h2>' + p.title + '</h2>' +
              '<p>' + p.excerpt + '</p>' +
              '<div class="post-card-footer">' +
                '<span>' + fmtDate(p.date) + (p.readTime ? ' &middot; ' + p.readTime + ' min read' : '') + '</span>' +
                '<span class="post-card-read">Read &rarr;</span>' +
              '</div>' +
            '</div>' +
          '</a>';
      });
      html += '</div>';
      area.innerHTML = html;
    })
    .catch(function() {
      area.innerHTML = '<div class="empty-state"><h2>Articles coming soon</h2><p>Check back shortly.</p></div>';
    });
</script>
</body>
</html>
